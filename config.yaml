# Global Settings
dry_run: true
interactive_mode: false
alert_threshold_mb: 0
logging_level: "INFO"
telegram_report: true
max_log_size_mb: 3

# CacheCleaner Settings
cache_expiry_days: 7
exclude_list:
  - "browser-session"
  - "ide-indexes"
  - "keep-this-folder"

# Package Manager Cleaner (pm_cleaner)
clean_aur_cache: true

# Systemd Journal Cleaner
journal_max_size: "200M"
journal_max_age: "7d"

# Trash Cleaner
trash_expiry_days: 30

# Docker Pruner
docker_prune_all: false
docker_prune_volumes: true

# Symlink Sweeper
symlink_scan_dirs:
  - "~/.config"
  - "~/.local/bin"
  - "~/.local/share"

# Thumbnail Cleaner
thumbnail_expiry_days: 14

# Orphan Remover (pacman -Qtdq)
remove_orphans: true

# Flatpak Cleaner
remove_unused_flatpaks: true

# Dev Cache Cleaner
clean_npm_cache: true
clean_pip_cache: true
clean_cargo_cache: true

# Storage Monitor
storage_alert_threshold_percent: 90

# Downloads Archiver
archive_downloads: true
archive_files_older_than_days: 180
archive_destination: "~/Downloads/Archive"
